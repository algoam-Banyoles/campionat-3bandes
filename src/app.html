<!doctype html>
<html lang="ca">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>3Bandes — Foment Martinenc</title>

		<!-- PWA Meta Tags -->
		<meta name="application-name" content="3Bandes" />
		<meta name="apple-mobile-web-app-title" content="3Bandes" />
		<meta name="description" content="Campionat de 3 Bandes del club" />
		<meta name="theme-color" content="#1a1814" />
		<meta name="msapplication-TileColor" content="#1a1814" />
		<meta name="msapplication-config" content="/browserconfig.xml" />

		<!-- iOS Safari Meta Tags -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-touch-fullscreen" content="yes" />
		<meta name="format-detection" content="telephone=no" />

		<!-- iOS Icons - una sola entrada (Safari escala segons necessitat) -->
		<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />

		<!-- Standard Icons - Using PNG for better compatibility -->
		<link rel="icon" type="image/png" sizes="48x48" href="/icons/icon-48x48.png" />
		<link rel="icon" type="image/png" sizes="72x72" href="/icons/icon-72x72.png" />
		<link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96x96.png" />
		<link rel="icon" type="image/png" sizes="144x144" href="/icons/icon-144x144.png" />
		<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
		<link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />

		<!-- PWA Manifest -->
		<link rel="manifest" href="/manifest.json" />

		<!-- Tipografia: Inter variable (sistema de disseny editorial). Veure CLAUDE.md § Direcció de disseny. -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&display=swap"
			rel="stylesheet"
		/>

		<!-- Mobile CSS (loaded via components) -->

		<style>
			.sveltekit-body-wrapper { display: contents; }
		</style>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="safe-area-top safe-area-bottom">
		<!-- Service Worker Registration - NO cacheja APIs -->
		<script>
			if ('serviceWorker' in navigator) {
				window.addEventListener('load', function() {
					navigator.serviceWorker.register('/sw.js').then(function(registration) {
						console.log('✅ SW registrat:', registration.scope);
					}).catch(function(err) {
						console.log('⚠️ Error registrant SW:', err);
					});
				});
			}
		</script>

		<div class="sveltekit-body-wrapper">%sveltekit.body%</div>

		<!-- Mobile Navigation will be inserted here -->
		<div id="mobile-nav-root"></div>
	</body>
</html>
