<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1536" role="img" aria-labelledby="title desc">
  <title id="title">Secció de billar - Foment Martinenc</title>
  <desc id="desc">Logotip vertical de la secció de billar del Foment Martinenc sense referència a 3 bandes.</desc>
  <rect width="1024" height="1536" fill="#000000"/>

